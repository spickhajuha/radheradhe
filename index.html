<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Radha Ramana Jap Anushthan</title>
    <!-- Chart.js for Graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Samarkan&display=swap');

        :root {
            --pink-dark: #AD1457;
            --pink-main: #D81B60;
            --pink-light: #F8BBD0;
            --pink-bg: #FCE4EC;
            --gold: #FBC02D;
            --white-glass: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: radial-gradient(circle at top, var(--pink-light), var(--pink-bg));
            color: var(--pink-dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Lotus Background Animation */
        .bg-petals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background-image: radial-gradient(var(--pink-main) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: floatBg 20s linear infinite;
        }

        @keyframes floatBg {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        header h1 {
            font-family: 'Samarkan', sans-serif;
            font-size: 3rem;
            color: var(--pink-dark);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        header p {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--pink-main);
        }

        /* Settings Icon */
        .settings-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            color: var(--pink-dark);
            cursor: pointer;
            animation: spinBg 10s linear infinite;
        }

        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        /* Glassmorphism Cards */
        .card {
            background: var(--white-glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Main Counter Area */
        .counter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .tap-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--pink-main), var(--pink-dark));
            border: 6px solid var(--gold);
            color: white;
            font-size: 4.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(173, 20, 87, 0.4), inset 0 5px 15px rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite alternate;
        }

        .tap-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(173, 20, 87, 0.4);
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(216, 27, 96, 0.4); }
            100% { box-shadow: 0 0 0 25px rgba(216, 27, 96, 0); }
        }

        .local-beads {
            font-size: 1.3rem;
            margin-top: 20px;
            color: var(--pink-dark);
            font-weight: 700;
        }

        /* Progress Grid */
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .progress-box {
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            background: rgba(248, 187, 208, 0.3);
            border: 1px solid var(--pink-light);
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-main), var(--gold));
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .estimation-box {
            background: linear-gradient(135deg, var(--gold), #FFF59D);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            color: #3e2723;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: var(--white-glass);
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.26, 1.55);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.8rem;
            color: var(--pink-dark);
            cursor: pointer;
        }

        .setting-group {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--pink-light);
        }

        .setting-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--pink-dark);
        }

        input, select, button.action-btn {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--pink-light);
            outline: none;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 10px;
        }

        button.action-btn {
            background: var(--pink-main);
            color: white;
            cursor: pointer;
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.3);
        }

        button.action-btn:hover { background: var(--pink-dark); }

        .flex-row { display: flex; gap: 10px; }
        .flex-row input { margin-bottom: 0; }

        .mode-switch {
            display: flex;
            gap: 10px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid var(--pink-main);
            background: transparent;
            color: var(--pink-main);
            font-weight: bold;
            cursor: pointer;
        }
        
        .mode-btn.active {
            background: var(--pink-main);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--pink-dark);
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
            visibility: visible;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.26, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: translate(-50%, 50px); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="bg-petals"></div>

    <div class="container">
        <header>
            <h1>Shri Radha Ramana</h1>
            <p>Divya Jap Anushthan</p>
            <i class="fas fa-dharmachakra settings-icon" onclick="openSettings()"></i>
        </header>

        <!-- Counter Section -->
        <div class="card counter-section">
            <h2 id="modeTitle" style="margin-bottom: 20px;">Mukhya Sankalp: 49 Charan</h2>
            <button class="tap-btn" id="tapBtn">0</button>
            <div class="local-beads">Vartaman Prawah: <span id="localBeadsDisplay">0</span> / 128</div>
        </div>

        <!-- Progress Details -->
        <div class="card">
            <h3><i class="fas fa-om"></i> Kripa Prapti (Progress)</h3>
            <div class="progress-grid" id="mainProgressGrid">
                <!-- Populated by JS -->
            </div>
            <div id="estimationDiv" class="estimation-box">
                <i class="fas fa-calendar-alt"></i> Purnata Ki Sambhavna: <span id="estDate">Ganna Chal Rahi Hai...</span>
            </div>
        </div>

        <!-- Graph Section -->
        <div class="card">
            <h3><i class="fas fa-chart-area"></i> Jap Darshan</h3>
            <select id="chartRange" onchange="updateChart()" style="width:auto; margin-bottom:15px;">
                <option value="7">Pichle 7 Din</option>
                <option value="30">Pichle 30 Din</option>
                <option value="all">Sampurna Kal</option>
            </select>
            <canvas id="japChart"></canvas>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeSettings()">&times;</span>
            <h2><i class="fas fa-cog"></i> Anushthan Prabandhan</h2>
            
            <div class="setting-group">
                <label>Sankalp Chayan (Select Mode):</label>
                <div class="mode-switch">
                    <button class="mode-btn active" id="btnMainMode" onclick="switchMode('main')">Mukhya Sankalp</button>
                    <button class="mode-btn" id="btnAltMode" onclick="switchMode('alt')">Atirikt Sankalp</button>
                </div>
            </div>

            <div class="setting-group">
                <label>Visesh Samarpan (Add Offline Jap):</label>
                <div class="flex-row">
                    <input type="number" id="manualMalas" placeholder="Malas" min="0">
                    <input type="number" id="manualBeads" placeholder="Jaap (Manke)" min="0">
                </div>
                <button class="action-btn" onclick="addManualProgress()" style="margin-top:10px;">Jap Samarpit Karein</button>
            </div>

            <div class="setting-group" id="altTargetGroup" style="display: none;">
                <label>Atirikt Sankalp Nirdharan (Set Target in Malas):</label>
                <div class="flex-row">
                    <input type="number" id="altTargetInput" placeholder="Total Malas">
                    <button class="action-btn" onclick="setAltTarget()">Sthapit Karein</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toastMsg">🌸 1 Mala Purna! Shri Radhe 🌸</div>

    <!-- Firebase SDK (Modular Approach) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCEOXyQ1_eOsEhEg4hJg96viwoJ_uqL6DA",
            authDomain: "result-ea3d7.firebaseapp.com",
            databaseURL: "https://result-ea3d7-default-rtdb.firebaseio.com",
            projectId: "result-ea3d7",
            storageBucket: "result-ea3d7.firebasestorage.app",
            messagingSenderId: "428500567446",
            appId: "1:428500567446:web:4a02b0442651e4a9ca09b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Constants
        const BEADS_PER_MALA = 128;
        const MALAS_PER_BATCH = 11;
        const TOTAL_BATCHES = 49;
        const TOTAL_MALAS = TOTAL_BATCHES * MALAS_PER_BATCH; // 539
        const TOTAL_BEADS = TOTAL_MALAS * BEADS_PER_MALA; // 68992

        // State Variables
        let currentMode = 'main'; 
        let localBeads = parseInt(localStorage.getItem('localBeads')) || 0;
        
        let globalData = {
            mainCompletedBeads: 0,
            altTargetMalas: 0,
            altCompletedBeads: 0,
            history: {}
        };

        let japChartInstance = null;

        // UI Elements
        const tapBtn = document.getElementById('tapBtn');
        const localBeadsDisplay = document.getElementById('localBeadsDisplay');
        const mainProgressGrid = document.getElementById('mainProgressGrid');
        const modeTitle = document.getElementById('modeTitle');
        const altTargetGroup = document.getElementById('altTargetGroup');
        const estimationDiv = document.getElementById('estimationDiv');
        const settingsModal = document.getElementById('settingsModal');

        // Initialization
        initLocalBeads();
        listenToFirebase();

        // ------------------ Core Interaction Logic ------------------

        tapBtn.addEventListener('click', function(e) {
            createRipple(e);
            localBeads++;
            
            tapBtn.innerText = localBeads;
            localBeadsDisplay.innerText = localBeads;
            localStorage.setItem('localBeads', localBeads);

            if (localBeads >= BEADS_PER_MALA) {
                localBeads = 0;
                tapBtn.innerText = 0;
                localBeadsDisplay.innerText = 0;
                localStorage.setItem('localBeads', 0);
                
                showToast("🌸 1 Mala Purna! Shri Radhe 🌸");
                syncProgressToFirebase(BEADS_PER_MALA); // Sync 1 exact mala's beads
            }
        });

        // Modal Functions exposed to window
        window.openSettings = () => settingsModal.classList.add('active');
        window.closeSettings = () => settingsModal.classList.remove('active');

        window.switchMode = function(mode) {
            currentMode = mode;
            document.getElementById('btnMainMode').classList.remove('active');
            document.getElementById('btnAltMode').classList.remove('active');
            
            if (mode === 'main') {
                document.getElementById('btnMainMode').classList.add('active');
                modeTitle.innerText = "Mukhya Sankalp: 49 Charan";
                altTargetGroup.style.display = "none";
                estimationDiv.style.display = "block";
            } else {
                document.getElementById('btnAltMode').classList.add('active');
                modeTitle.innerText = "Atirikt Sankalp";
                altTargetGroup.style.display = "block";
                estimationDiv.style.display = "none";
            }
            updateUI();
        };

        // ------------------ Firebase Sync Logic ------------------

        function listenToFirebase() {
            const dataRef = ref(db, 'japData');
            onValue(dataRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    globalData = {
                        mainCompletedBeads: data.mainCompletedBeads || 0,
                        altTargetMalas: data.altTargetMalas || 0,
                        altCompletedBeads: data.altCompletedBeads || 0,
                        history: data.history || {}
                    };
                }
                updateUI();
                updateChart();
                calculateEstimate();
            });
        }

        // Sync exact bead count
        function syncProgressToFirebase(beadsToAdd) {
            const todayDate = new Date().toISOString().split('T')[0];
            const updates = {};
            
            if (currentMode === 'main') {
                updates['/japData/mainCompletedBeads'] = globalData.mainCompletedBeads + beadsToAdd;
            } else {
                updates['/japData/altCompletedBeads'] = globalData.altCompletedBeads + beadsToAdd;
            }

            const currentHistoryBeads = (globalData.history[todayDate] && globalData.history[todayDate][currentMode]) || 0;
            updates[`/japData/history/${todayDate}/${currentMode}`] = currentHistoryBeads + beadsToAdd;

            update(ref(db), updates);
        }

        window.addManualProgress = function() {
            const malasInput = document.getElementById('manualMalas').value;
            const beadsInput = document.getElementById('manualBeads').value;
            
            const malas = parseInt(malasInput) || 0;
            const beads = parseInt(beadsInput) || 0;

            const totalBeadsToAdd = (malas * BEADS_PER_MALA) + beads;

            if (totalBeadsToAdd > 0) {
                syncProgressToFirebase(totalBeadsToAdd);
                showToast(`🌸 ${malas} Mala aur ${beads} Jaap Samarpit! 🌸`);
                
                // Reset inputs and close
                document.getElementById('manualMalas').value = "";
                document.getElementById('manualBeads').value = "";
                closeSettings();
            } else {
                alert("Kripaya uchit sankhya darj karein.");
            }
        };

        window.setAltTarget = function() {
            const target = parseInt(document.getElementById('altTargetInput').value);
            if (target > 0) {
                update(ref(db), { '/japData/altTargetMalas': target });
                showToast("🎯 Atirikt Sankalp Nirdharit Hua!");
                document.getElementById('altTargetInput').value = "";
                closeSettings();
            }
        };

        // ------------------ UI & Math Calculations ------------------

        function initLocalBeads() {
            tapBtn.innerText = localBeads;
            localBeadsDisplay.innerText = localBeads;
        }

        function updateUI() {
            mainProgressGrid.innerHTML = ""; 

            if (currentMode === 'main') {
                const compBeads = globalData.mainCompletedBeads;
                const compMalas = Math.floor(compBeads / BEADS_PER_MALA);
                const compBatches = Math.floor(compMalas / MALAS_PER_BATCH);

                const remBeads = Math.max(0, TOTAL_BEADS - compBeads);
                const remMalas = Math.max(0, TOTAL_MALAS - compMalas);
                const remBatches = Math.max(0, TOTAL_BATCHES - compBatches);

                const pctBeads = Math.min(100, (compBeads / TOTAL_BEADS) * 100).toFixed(2);
                const pctMalas = Math.min(100, (compMalas / TOTAL_MALAS) * 100).toFixed(2);
                const pctBatches = Math.min(100, (compBatches / TOTAL_BATCHES) * 100).toFixed(2);

                mainProgressGrid.innerHTML += createProgressBox("Sampurna Charan", compBatches, remBatches, pctBatches);
                mainProgressGrid.innerHTML += createProgressBox("Sampurna Mala", compMalas, remMalas, pctMalas);
                mainProgressGrid.innerHTML += createProgressBox("Sampurna Jaap", compBeads, remBeads, pctBeads);

            } else {
                const targetBeads = globalData.altTargetMalas * BEADS_PER_MALA;
                const compBeads = globalData.altCompletedBeads;
                const compMalas = Math.floor(compBeads / BEADS_PER_MALA);
                
                const remBeads = Math.max(0, targetBeads - compBeads);
                const remMalas = Math.max(0, globalData.altTargetMalas - compMalas);
                
                let pctBeads = targetBeads > 0 ? Math.min(100, (compBeads / targetBeads) * 100).toFixed(2) : 0;
                let pctMalas = globalData.altTargetMalas > 0 ? Math.min(100, (compMalas / globalData.altTargetMalas) * 100).toFixed(2) : 0;

                mainProgressGrid.innerHTML += createProgressBox("Atirikt Mala", compMalas, remMalas, pctMalas);
                mainProgressGrid.innerHTML += createProgressBox("Atirikt Jaap", compBeads, remBeads, pctBeads);
            }
        }

        function createProgressBox(title, done, left, pct) {
            return `
                <div class="progress-box">
                    <h4>${title}</h4>
                    <p style="font-size:1.2rem; font-weight:bold; color:var(--pink-dark); margin:5px 0;">${pct}%</p>
                    <p style="font-size:0.9rem;">Purna: ${done} | Shesh: ${left}</p>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${pct}%"></div>
                    </div>
                </div>
            `;
        }

        // ------------------ Estimation Logic (Last 5 Days) ------------------
        
        function calculateEstimate() {
            if (currentMode !== 'main') return;
            
            const history = globalData.history;
            const today = new Date();
            let totalBeadsLast5Days = 0;

            for (let i = 1; i <= 5; i++) {
                let d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                
                if (history[dateStr] && history[dateStr].main) {
                    totalBeadsLast5Days += history[dateStr].main;
                }
            }

            const remBeads = Math.max(0, TOTAL_BEADS - globalData.mainCompletedBeads);
            
            if (remBeads === 0) {
                document.getElementById('estDate').innerText = "Sankalp Purna Hua! 🎉 Radhe Radhe!";
                return;
            }

            if (totalBeadsLast5Days === 0) {
                document.getElementById('estDate').innerText = "Ganna hetu niyamit jap aavashyak hai.";
                return;
            }

            const avgBeadsPerDay = totalBeadsLast5Days / 5; 
            const daysLeft = Math.ceil(remBeads / avgBeadsPerDay);
            
            const estDate = new Date();
            estDate.setDate(estDate.getDate() + daysLeft);
            
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('estDate').innerText = estDate.toLocaleDateString('hi-IN', options);
        }

        // ------------------ Chart.js Logic ------------------

        window.updateChart = function() {
            const range = document.getElementById('chartRange').value;
            const history = globalData.history;
            
            let dates = Object.keys(history).sort();
            if (range !== 'all') {
                dates = dates.slice(-parseInt(range));
            }

            const labels = dates;
            const dataMain = dates.map(d => Math.floor((history[d].main || 0) / BEADS_PER_MALA));
            const dataAlt = dates.map(d => Math.floor((history[d].alt || 0) / BEADS_PER_MALA));

            const ctx = document.getElementById('japChart').getContext('2d');
            
            if (japChartInstance) {
                japChartInstance.destroy();
            }

            japChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Mukhya Sankalp (Malas)',
                            data: dataMain,
                            borderColor: '#D81B60',
                            backgroundColor: 'rgba(216, 27, 96, 0.2)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Atirikt Sankalp (Malas)',
                            data: dataAlt,
                            borderColor: '#FBC02D',
                            backgroundColor: 'rgba(251, 192, 45, 0.2)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        };

        // ------------------ Aesthetics & Animations ------------------

        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            const rect = button.getBoundingClientRect();
            
            let clientX = event.clientX;
            let clientY = event.clientY;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${clientX - rect.left - radius}px`;
            circle.style.top = `${clientY - rect.top - radius}px`;
            circle.classList.add("ripple");

            const existingRipple = button.querySelector('.ripple');
            if (existingRipple) {
                existingRipple.remove();
            }

            button.appendChild(circle);
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

    </script>
</body>
</html>
