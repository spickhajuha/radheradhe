<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhe Radhe - Jap Anushthan</title>
    <!-- Chart.js for Graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Yatra+One&display=swap');

        :root {
            --pink-dark: #880E4F;
            --pink-main: #D81B60;
            --pink-light: #F8BBD0;
            --pink-bg: #FCE4EC;
            --gold: #FFD54F;
            --gold-dark: #FF8F00;
            --white-glass: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            /* Advanced Animated Gradient Background */
            background: linear-gradient(-45deg, #FCE4EC, #F8BBD0, #F48FB1, #FFCDD2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--pink-dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Lotus/Particles Background Animation */
        .bg-petals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background-image: radial-gradient(var(--pink-main) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            opacity: 0.15;
            animation: floatBg 20s linear infinite;
        }

        @keyframes floatBg {
            0% { background-position: 0 0; transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { background-position: 100px 100px; transform: scale(1); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            padding-top: 10px;
        }

        header h1 {
            font-family: 'Yatra One', cursive;
            font-size: 3.5rem;
            color: var(--pink-dark);
            text-shadow: 2px 2px 8px rgba(216, 27, 96, 0.3), -1px -1px 0 #fff;
            letter-spacing: 2px;
            animation: textFloat 3s ease-in-out infinite alternate;
        }

        @keyframes textFloat {
            from { transform: translateY(0px); text-shadow: 2px 2px 8px rgba(216,27,96,0.3); }
            to { transform: translateY(-5px); text-shadow: 2px 10px 12px rgba(216,27,96,0.5); }
        }

        /* Settings Icon */
        .settings-icon {
            position: absolute;
            top: 15px;
            right: 10px;
            font-size: 2.2rem;
            color: var(--pink-dark);
            cursor: pointer;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            animation: spinBg 12s linear infinite;
        }
        
        .settings-icon:hover {
            transform: scale(1.2) rotate(90deg);
            color: var(--pink-main);
        }

        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        /* Advanced Glassmorphism Cards */
        .card {
            background: var(--white-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 12px 35px rgba(216, 27, 96, 0.1), inset 0 0 0 1px var(--glass-border);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--pink-dark);
            border-bottom: 2px dashed rgba(216, 27, 96, 0.3);
            padding-bottom: 10px;
        }

        /* Main Counter Area */
        .counter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
        }

        /* Advanced Tap Button with 3D Glow */
        .tap-btn {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6090, var(--pink-main), var(--pink-dark));
            border: 8px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 5rem;
            font-weight: bold;
            font-family: 'Yatra One', cursive;
            cursor: pointer;
            box-shadow: 
                0 20px 50px rgba(173, 20, 87, 0.5), 
                inset 0 10px 20px rgba(255,255,255,0.6),
                inset 0 -10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: pulse-glow 2.5s infinite alternate;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tap-btn:active {
            transform: scale(0.92) translateY(5px);
            box-shadow: 
                0 10px 20px rgba(173, 20, 87, 0.4), 
                inset 0 5px 10px rgba(255,255,255,0.4),
                inset 0 -5px 15px rgba(0,0,0,0.2);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(216, 27, 96, 0.5), inset 0 10px 20px rgba(255,255,255,0.6), inset 0 -10px 30px rgba(0,0,0,0.3); }
            100% { box-shadow: 0 0 0 35px rgba(216, 27, 96, 0), inset 0 10px 20px rgba(255,255,255,0.6), inset 0 -10px 30px rgba(0,0,0,0.3); }
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            transform: scale(0);
            animation: ripple-anim 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        .local-beads {
            font-size: 1.4rem;
            margin-top: 25px;
            background: rgba(255,255,255,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            color: var(--pink-dark);
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Progress Grid */
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .progress-box {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
        }
        
        .progress-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(216, 27, 96, 0.15);
        }

        .progress-bar-bg {
            width: 100%;
            height: 14px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--pink-main));
            width: 0%;
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .estimation-box {
            background: linear-gradient(135deg, rgba(255,213,79,0.8), rgba(255,245,157,0.8));
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            font-weight: 700;
            color: #5D4037;
            margin-top: 20px;
            font-size: 1.15rem;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 5px 15px rgba(255, 143, 0, 0.2);
        }

        /* Advanced Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            width: 92%;
            max-width: 450px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.5);
            position: relative;
            transform: scale(0.7) translateY(50px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem;
            color: var(--pink-dark);
            cursor: pointer;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
        }
        
        .close-btn:hover { background: var(--pink-light); transform: rotate(90deg); }

        .setting-group {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed var(--pink-light);
        }

        .setting-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--pink-dark);
        }

        input, select {
            padding: 14px 15px;
            border-radius: 12px;
            border: 2px solid var(--pink-light);
            background: rgba(255,255,255,0.9);
            outline: none;
            font-size: 1.05rem;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        
        input:focus, select:focus {
            border-color: var(--pink-main);
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.2);
        }

        button.action-btn {
            padding: 14px 15px;
            border-radius: 12px;
            border: none;
            width: 100%;
            background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.action-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.4);
        }

        .flex-row { display: flex; gap: 15px; }
        .flex-row input { margin-bottom: 0; }

        .mode-switch {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.5);
            padding: 5px;
            border-radius: 15px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--pink-dark);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .mode-btn.active {
            background: white;
            color: var(--pink-main);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #3E2723;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
            border: 2px solid white;
        }
        
        .toast.show {
            opacity: 1;
            visibility: visible;
            animation: bounceInToast 0.6s cubic-bezier(0.68, -0.55, 0.26, 1.55) forwards;
        }

        @keyframes bounceInToast {
            0% { transform: translate(-50%, 50px) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="bg-petals"></div>

    <div class="container">
        <header>
            <h1>राधे राधे</h1>
            <i class="fas fa-dharmachakra settings-icon" onclick="openSettings()"></i>
        </header>

        <!-- Counter Section -->
        <div class="card counter-section">
            <h2 id="modeTitle" style="margin-bottom: 25px; font-weight: 800; color: var(--pink-dark); font-size: 1.6rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">मुख्य संकल्प: 49 चरण</h2>
            <button class="tap-btn" id="tapBtn">0</button>
            <div class="local-beads">वर्तमान प्रवाह: <span id="localBeadsDisplay">0</span> / 128</div>
        </div>

        <!-- Progress Details -->
        <div class="card">
            <h3><i class="fas fa-om"></i> कृपा प्राप्ति (प्रगति)</h3>
            <div class="progress-grid" id="mainProgressGrid">
                <!-- Populated by JS -->
            </div>
            <div id="estimationDiv" class="estimation-box">
                <i class="fas fa-calendar-check"></i> पूर्णता की संभावना: <span id="estDate">गणना चल रही है...</span>
            </div>
        </div>

        <!-- Graph Section -->
        <div class="card">
            <h3><i class="fas fa-chart-line"></i> जाप दर्शन (चार्ट)</h3>
            <select id="chartRange" onchange="updateChart()" style="width:auto; margin-bottom:20px; font-weight: bold; background: white;">
                <option value="7">पिछले 7 दिन</option>
                <option value="30">पिछले 30 दिन</option>
                <option value="all">संपूर्ण काल</option>
            </select>
            <canvas id="japChart"></canvas>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeSettings()">&times;</span>
            <h2 style="color: var(--pink-dark); margin-bottom: 10px;"><i class="fas fa-sliders-h"></i> अनुष्ठान प्रबंधन</h2>
            
            <div class="setting-group">
                <label>संकल्प चयन (Select Mode):</label>
                <div class="mode-switch">
                    <button class="mode-btn active" id="btnMainMode" onclick="switchMode('main')">मुख्य संकल्प</button>
                    <button class="mode-btn" id="btnAltMode" onclick="switchMode('alt')">अतिरिक्त संकल्प</button>
                </div>
            </div>

            <div class="setting-group">
                <label>विशेष समर्पण (मैनुअल जाप जोड़ें):</label>
                <div class="flex-row">
                    <input type="number" id="manualMalas" placeholder="माला" min="0">
                    <input type="number" id="manualBeads" placeholder="जाप (मनके)" min="0">
                </div>
                <button class="action-btn" onclick="addManualProgress()" style="margin-top:15px;"><i class="fas fa-praying-hands"></i> जाप समर्पित करें</button>
            </div>

            <div class="setting-group" id="altTargetGroup" style="display: none;">
                <label>अतिरिक्त संकल्प निर्धारण (माला में):</label>
                <div class="flex-row">
                    <input type="number" id="altTargetInput" placeholder="कुल माला">
                    <button class="action-btn" onclick="setAltTarget()">स्थापित करें</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toastMsg">🌸 1 माला पूर्ण! राधे राधे 🌸</div>

    <!-- Firebase SDK (Modular Approach) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuration (Aapki Same Original Keys)
        const firebaseConfig = {
            apiKey: "AIzaSyCEOXyQ1_eOsEhEg4hJg96viwoJ_uqL6DA",
            authDomain: "result-ea3d7.firebaseapp.com",
            databaseURL: "https://result-ea3d7-default-rtdb.firebaseio.com",
            projectId: "result-ea3d7",
            storageBucket: "result-ea3d7.firebasestorage.app",
            messagingSenderId: "428500567446",
            appId: "1:428500567446:web:4a02b0442651e4a9ca09b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Constants (Aapke original logic ke hisab se)
        const BEADS_PER_MALA = 128;
        const MALAS_PER_BATCH = 11;
        const TOTAL_BATCHES = 49;
        const TOTAL_MALAS = TOTAL_BATCHES * MALAS_PER_BATCH; // 539
        const TOTAL_BEADS = TOTAL_MALAS * BEADS_PER_MALA; // 68992

        // State Variables
        let currentMode = 'main'; 
        let localBeads = parseInt(localStorage.getItem('localBeads')) || 0;
        
        let globalData = {
            mainCompletedBeads: 0,
            altTargetMalas: 0,
            altCompletedBeads: 0,
            history: {}
        };

        let japChartInstance = null;

        // UI Elements
        const tapBtn = document.getElementById('tapBtn');
        const localBeadsDisplay = document.getElementById('localBeadsDisplay');
        const mainProgressGrid = document.getElementById('mainProgressGrid');
        const modeTitle = document.getElementById('modeTitle');
        const altTargetGroup = document.getElementById('altTargetGroup');
        const estimationDiv = document.getElementById('estimationDiv');
        const settingsModal = document.getElementById('settingsModal');

        // Initialization
        initLocalBeads();
        listenToFirebase();

        // ------------------ Core Interaction Logic ------------------

        tapBtn.addEventListener('click', function(e) {
            createRipple(e);
            localBeads++;
            
            tapBtn.innerText = localBeads;
            localBeadsDisplay.innerText = localBeads;
            localStorage.setItem('localBeads', localBeads);

            if (localBeads >= BEADS_PER_MALA) {
                localBeads = 0;
                tapBtn.innerText = 0;
                localBeadsDisplay.innerText = 0;
                localStorage.setItem('localBeads', 0);
                
                showToast("🌸 1 माला पूर्ण! राधे राधे 🌸");
                syncProgressToFirebase(BEADS_PER_MALA); // Sync 1 exact mala's beads
            }
        });

        // Modal Functions exposed to window
        window.openSettings = () => settingsModal.classList.add('active');
        window.closeSettings = () => settingsModal.classList.remove('active');

        window.switchMode = function(mode) {
            currentMode = mode;
            document.getElementById('btnMainMode').classList.remove('active');
            document.getElementById('btnAltMode').classList.remove('active');
            
            if (mode === 'main') {
                document.getElementById('btnMainMode').classList.add('active');
                modeTitle.innerText = "मुख्य संकल्प: 49 चरण";
                altTargetGroup.style.display = "none";
                estimationDiv.style.display = "block";
            } else {
                document.getElementById('btnAltMode').classList.add('active');
                modeTitle.innerText = "अतिरिक्त संकल्प";
                altTargetGroup.style.display = "block";
                estimationDiv.style.display = "none";
            }
            updateUI();
        };

        // ------------------ Firebase Sync Logic ------------------

        function listenToFirebase() {
            const dataRef = ref(db, 'japData');
            onValue(dataRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    globalData = {
                        mainCompletedBeads: data.mainCompletedBeads || 0,
                        altTargetMalas: data.altTargetMalas || 0,
                        altCompletedBeads: data.altCompletedBeads || 0,
                        history: data.history || {}
                    };
                }
                updateUI();
                updateChart();
                calculateEstimate();
            });
        }

        // Sync exact bead count
        function syncProgressToFirebase(beadsToAdd) {
            const todayDate = new Date().toISOString().split('T')[0];
            const updates = {};
            
            if (currentMode === 'main') {
                updates['/japData/mainCompletedBeads'] = globalData.mainCompletedBeads + beadsToAdd;
            } else {
                updates['/japData/altCompletedBeads'] = globalData.altCompletedBeads + beadsToAdd;
            }

            const currentHistoryBeads = (globalData.history[todayDate] && globalData.history[todayDate][currentMode]) || 0;
            updates[`/japData/history/${todayDate}/${currentMode}`] = currentHistoryBeads + beadsToAdd;

            update(ref(db), updates);
        }

        // Updated Function: Adding Manual Progress and dynamically updating the main circle 
        window.addManualProgress = function() {
            const malasInput = document.getElementById('manualMalas').value;
            const beadsInput = document.getElementById('manualBeads').value;
            
            const malas = parseInt(malasInput) || 0;
            const beads = parseInt(beadsInput) || 0;

            const totalBeadsToAdd = (malas * BEADS_PER_MALA) + beads;

            if (totalBeadsToAdd > 0) {
                syncProgressToFirebase(totalBeadsToAdd);
                
                // --- ADVANCED FEATURE: Updating local circle with remainder logic ---
                // Example: If user types 138 beads, 138 % 128 = 10, local circle becomes 10.
                localBeads = (localBeads + totalBeadsToAdd) % BEADS_PER_MALA;
                tapBtn.innerText = localBeads;
                localBeadsDisplay.innerText = localBeads;
                localStorage.setItem('localBeads', localBeads);
                // --------------------------------------------------------------------

                showToast(`🌸 ${malas} माला और ${beads} जाप समर्पित! 🌸`);
                
                // Reset inputs and close
                document.getElementById('manualMalas').value = "";
                document.getElementById('manualBeads').value = "";
                closeSettings();
            } else {
                alert("कृपया उचित संख्या दर्ज करें।");
            }
        };

        window.setAltTarget = function() {
            const target = parseInt(document.getElementById('altTargetInput').value);
            if (target > 0) {
                update(ref(db), { '/japData/altTargetMalas': target });
                showToast("🎯 अतिरिक्त संकल्प निर्धारित हुआ!");
                document.getElementById('altTargetInput').value = "";
                closeSettings();
            }
        };

        // ------------------ UI & Math Calculations ------------------

        function initLocalBeads() {
            tapBtn.innerText = localBeads;
            localBeadsDisplay.innerText = localBeads;
        }

        function updateUI() {
            mainProgressGrid.innerHTML = ""; 

            if (currentMode === 'main') {
                const compBeads = globalData.mainCompletedBeads;
                const compMalas = Math.floor(compBeads / BEADS_PER_MALA);
                const compBatches = Math.floor(compMalas / MALAS_PER_BATCH);

                const remBeads = Math.max(0, TOTAL_BEADS - compBeads);
                const remMalas = Math.max(0, TOTAL_MALAS - compMalas);
                const remBatches = Math.max(0, TOTAL_BATCHES - compBatches);

                const pctBeads = Math.min(100, (compBeads / TOTAL_BEADS) * 100).toFixed(2);
                const pctMalas = Math.min(100, (compMalas / TOTAL_MALAS) * 100).toFixed(2);
                const pctBatches = Math.min(100, (compBatches / TOTAL_BATCHES) * 100).toFixed(2);

                mainProgressGrid.innerHTML += createProgressBox("संपूर्ण चरण", compBatches, remBatches, pctBatches);
                mainProgressGrid.innerHTML += createProgressBox("संपूर्ण माला", compMalas, remMalas, pctMalas);
                mainProgressGrid.innerHTML += createProgressBox("संपूर्ण जाप", compBeads, remBeads, pctBeads);

            } else {
                const targetBeads = globalData.altTargetMalas * BEADS_PER_MALA;
                const compBeads = globalData.altCompletedBeads;
                const compMalas = Math.floor(compBeads / BEADS_PER_MALA);
                
                const remBeads = Math.max(0, targetBeads - compBeads);
                const remMalas = Math.max(0, globalData.altTargetMalas - compMalas);
                
                let pctBeads = targetBeads > 0 ? Math.min(100, (compBeads / targetBeads) * 100).toFixed(2) : 0;
                let pctMalas = globalData.altTargetMalas > 0 ? Math.min(100, (compMalas / globalData.altTargetMalas) * 100).toFixed(2) : 0;

                mainProgressGrid.innerHTML += createProgressBox("अतिरिक्त माला", compMalas, remMalas, pctMalas);
                mainProgressGrid.innerHTML += createProgressBox("अतिरिक्त जाप", compBeads, remBeads, pctBeads);
            }
        }

        function createProgressBox(title, done, left, pct) {
            return `
                <div class="progress-box">
                    <h4 style="color:var(--pink-dark); font-weight:700;">${title}</h4>
                    <p style="font-size:1.5rem; font-weight:800; color:var(--pink-main); margin:8px 0; text-shadow: 1px 1px 0px rgba(0,0,0,0.05);">${pct}%</p>
                    <p style="font-size:0.9rem; font-weight:600; color:#5D4037;">पूर्ण: ${done} | शेष: ${left}</p>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${pct}%"></div>
                    </div>
                </div>
            `;
        }

        // ------------------ Estimation Logic (Last 5 Days) ------------------
        
        function calculateEstimate() {
            if (currentMode !== 'main') return;
            
            const history = globalData.history;
            const today = new Date(); // आज की तारीख को बेस (Base) मानेगा
            let totalBeadsLast5Days = 0;
            let daysActive = 0; // भाग (Divide) करने के लिए डायनामिक संख्या

            // आज (0) से लेकर पिछले 4 दिन (कुल 5 दिन) तक का रिकॉर्ड चेक करेगा
            for (let i = 0; i < 5; i++) {
                let d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                
                if (history[dateStr] && history[dateStr].main > 0) {
                    totalBeadsLast5Days += history[dateStr].main;
                    // जितने दिन पीछे तक डेटा मिलेगा, उतने दिन का बेस सेट करेगा (अधिकतम 5)
                    daysActive = Math.max(daysActive, i + 1);
                }
            }

            const remBeads = Math.max(0, TOTAL_BEADS - globalData.mainCompletedBeads);
            
            if (remBeads === 0) {
                document.getElementById('estDate').innerText = "संकल्प पूर्ण हुआ! 🎉 राधे राधे!";
                return;
            }

            if (totalBeadsLast5Days === 0) {
                document.getElementById('estDate').innerText = "गणना हेतु नियमित जाप आवश्यक है।";
                return;
            }

            // अगर आज पहला दिन है तो 1 से भाग, कल 2 से, अधिकतम 5 से (आपके नियम के अनुसार)
            const avgBeadsPerDay = totalBeadsLast5Days / daysActive; 
            const daysLeft = Math.ceil(remBeads / avgBeadsPerDay);
            
            const estDate = new Date();
            estDate.setDate(estDate.getDate() + daysLeft);
            
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('estDate').innerText = estDate.toLocaleDateString('hi-IN', options);
        }

        // ------------------ Chart.js Logic ------------------

        window.updateChart = function() {
            const range = document.getElementById('chartRange').value;
            const history = globalData.history;
            
            let dates = Object.keys(history).sort();
            if (range !== 'all') {
                dates = dates.slice(-parseInt(range));
            }

            const labels = dates;
            const dataMain = dates.map(d => Math.floor((history[d].main || 0) / BEADS_PER_MALA));
            const dataAlt = dates.map(d => Math.floor((history[d].alt || 0) / BEADS_PER_MALA));

            const ctx = document.getElementById('japChart').getContext('2d');
            
            if (japChartInstance) {
                japChartInstance.destroy();
            }

            // Advanced Chart Styling
            Chart.defaults.font.family = "'Poppins', sans-serif";
            Chart.defaults.color = '#880E4F';

            japChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'मुख्य संकल्प (माला)',
                            data: dataMain,
                            borderColor: '#D81B60',
                            backgroundColor: 'rgba(216, 27, 96, 0.3)',
                            borderWidth: 3,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#D81B60',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'अतिरिक्त संकल्प (माला)',
                            data: dataAlt,
                            borderColor: '#FF8F00',
                            backgroundColor: 'rgba(255, 143, 0, 0.3)',
                            borderWidth: 3,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#FF8F00',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { font: { weight: 'bold' } } }
                    },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        };

        // ------------------ Aesthetics & Animations ------------------

        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            const rect = button.getBoundingClientRect();
            
            let clientX = event.clientX;
            let clientY = event.clientY;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${clientX - rect.left - radius}px`;
            circle.style.top = `${clientY - rect.top - radius}px`;
            circle.classList.add("ripple");

            const existingRipple = button.querySelector('.ripple');
            if (existingRipple) {
                existingRipple.remove();
            }

            button.appendChild(circle);
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.add('show');
            
            // Re-trigger animation cleanly
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

    </script>
</body>
